    async function callAnthropicText(receiptText) {
      const prompt = 'Parse this Jewel Osco grocery receipt text and extract purchased items.\n' +
        'Return ONLY a JSON object, no other text. Format:\n' +
        '{"items_sold":null,"items":[{"item_code":"SHORT_KEY","description":"Full product name","quantity":1,"price":1.99}]}\n' +
        'Rules:\n' +
        '- "item_code": a short normalized key (uppercase letters and underscores only, max 20 chars, e.g. "WHOLE_MILK_1GAL"). Must be consistent for the same product.\n' +
        '- "quantity": if the line begins with "X QTY" (e.g. "2 QTY"), X is the quantity; otherwise 1\n' +
        '- "price": the item\'s total price for the quantity purchased (number, no $ sign)\n' +
        '- Skip: category headers, "Regular Price" lines, "Sale Savings" lines, tax, subtotals, totals, and any line that is not a purchased item\n' +
        '- Include each purchased item once\n\n' +
        'Receipt text:\n' + receiptText;

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'x-api-key': getApiKey(),
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1500,
          messages: [{ role: 'user', content: [{ type: 'text', text: prompt }] }]
        })
      });
      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.error?.message || 'HTTP ' + response.status);
      }
      const data = await response.json();
      const text = data.content?.[0]?.text || '';
      const objMatch = text.match(/\{[\s\S]*\}/);
      if (!objMatch) throw new Error('Unexpected response format. Check your API key.');
      const parsed = JSON.parse(objMatch[0]);
      return Array.isArray(parsed.items) ? parsed.items : [];
    }

    async function processPastedReceipt(text) {
      const loadingEl = document.createElement('div');
      loadingEl.className = 'receipt-overlay';
      loadingEl.innerHTML = '<div class="receipt-spinner">Reading receipt\u2026</div>';
      document.body.appendChild(loadingEl);
      try {
        const items = await callAnthropicText(text);
        loadingEl.remove();
        if (!items.length) { alert('No items found. Check the pasted text.'); return; }
        showReceiptResults(items);
      } catch (err) {
        loadingEl.remove();
        alert('Error: ' + err.message);
      }
    }

    function showReceiptResults(items) {
      const checklistItems = Object.entries(state.items)
        .filter(([, it]) => it && !it.deleted && it.type !== 'header' && it.text && it.text.trim())

      title.textContent = 'Found ' + items.length + ' item' + (items.length !== 1 ? 's' : '') + uniqueLabel;
      inner.appendChild(title);

      const added = [];

      items.forEach(item => {
        const cachedEntry = getCachedEntry(item.item_code);
        const cachedId    = cachedEntry ? cachedEntry.id : null;
        const cachedItem  = cachedId ? state.items[cachedId] : null;
        const isCached    = !!(cachedItem && !cachedItem.deleted);

        const card = document.createElement('div');

        }
        if (isCached) {
          const badge = document.createElement('span');

          headerRow.appendChild(badge);

        const descEl = document.createElement('div');

        const priceEl = document.createElement('div');

        card.appendChild(headerRow);
        card.appendChild(descEl);
        card.appendChild(priceEl);

        const matchRow = document.createElement('div');
        matchRow.className = 'receipt-match-row';

        // Checklist item dropdown
        const sel = document.createElement('select');
        sel.className = 'receipt-match-select';
        let opts = '<option value="">\u2014 skip \u2014</option>';
        checklistItems.forEach(([id, it]) => {
          const selected = id === cachedId ? ' selected' : '';
          opts += '<option value="' + id + '"' + selected + '>' + (it.text || '(blank)').replace(/</g, '&lt;') + '</option>';
        });
        sel.innerHTML = opts;

        // Qty input
        const qtyInput = document.createElement('input');
        qtyInput.type = 'number';
        qtyInput.inputMode = 'numeric';
        qtyInput.min = '1';
        qtyInput.className = 'receipt-qty-input';

        // Fill level indicator oval — shown when linked item has fill type and no qty entered
        const fillOval = document.createElement('div');

        fillOval.style.display = 'none';
        const fillBar = document.createElement('div');
        fillBar.className = 'qty-fill-bar';
        fillOval.appendChild(fillBar);

        function updateFillIndicator() {
          const selId = sel.value;
          const selIt = selId ? state.items[selId] : null;
          if (selIt && selIt.qtyType === 'fill' && !qtyInput.value.trim()) {
            fillOval.dataset.fill = selIt.qtyValue || 'Empty';
            fillOval.style.display = '';
          } else {
            fillOval.style.display = 'none';
          }
        }

        // Set initial qty value: cached qty > receipt qty; blank if linked item is fill type
        const initSelItem = isCached ? cachedItem : null;
        if (initSelItem && initSelItem.qtyType === 'fill') {
          qtyInput.value = ''; // blank — fill oval will show instead
        } else if (isCached && cachedEntry.qty != null) {
          qtyInput.value = String(cachedEntry.qty); // last-used qty
        } else {
          qtyInput.value = String(item.quantity || 1); // receipt qty as fallback
        }

        sel.addEventListener('change', updateFillIndicator);
        qtyInput.addEventListener('input', updateFillIndicator);

        // Run once on init so auto-matched fill items show the oval immediately
        updateFillIndicator();

        const addBtn = document.createElement('button');
        addBtn.className = 'receipt-add-btn';
        addBtn.textContent = 'Add';

        const skipBtn = document.createElement('button');
        skipBtn.className = 'receipt-skip-btn';
        skipBtn.textContent = 'Skip';

        addBtn.addEventListener('click', () => {
          const selectedId = sel.value;
          if (!selectedId) { card.style.opacity = '0.4'; return; }
          const it = state.items[selectedId];
          if (!it) return;

          const qtyStr = qtyInput.value.trim();
          if (qtyStr !== '') {
            // User entered a number — update qty (accumulate if already number, replace if fill)
            const qty = Math.max(1, Math.floor(Number(qtyStr) || 1));
            const prevType = it.qtyType;
            const prevQty  = (prevType === 'number' && typeof it.qtyValue === 'number') ? it.qtyValue : 0;
            it.qtyType  = 'number';
            it.qtyValue = prevQty + qty;
            it.updatedAt = Date.now();
            setCacheEntry(item.item_code, selectedId, qty);
          } else {
            // No qty — if fill item, set fill level to Full and turn oval green
            if (it.qtyType === 'fill') {
              it.qtyValue = 'Full';
              it.updatedAt = Date.now();
              fillOval.dataset.fill = 'Full'; // triggers green CSS (.qty-fill-oval[data-fill="Full"])
            }
            setCacheEntry(item.item_code, selectedId, null);
          }

          recordQtyHistory(selectedId);
          added.push(selectedId);
          card.style.opacity = '0.4';
          addBtn.disabled = true;
          addBtn.textContent = '\u2713';
          qtyInput.disabled = true;
        });

        skipBtn.addEventListener('click', () => { card.style.opacity = '0.4'; });

        matchRow.appendChild(sel);
        matchRow.appendChild(fillOval);
        matchRow.appendChild(qtyInput);
        matchRow.appendChild(addBtn);
        matchRow.appendChild(skipBtn);
        card.appendChild(matchRow);
        inner.appendChild(card);
      });

      const doneBtn = document.createElement('button');
      doneBtn.className = 'receipt-done-btn';
      doneBtn.textContent = 'Done';
      doneBtn.addEventListener('click', () => {
        if (added.length) {
          [...new Set(added)].forEach(id => fbSyncItem(id));
          save();
          render();
        }
        overlay.remove();
      });
      inner.appendChild(doneBtn);

      overlay.appendChild(inner);
      document.body.appendChild(overlay);
    }

    // Returns true if targetId is explicitly assigned to the currently-dragged header
    function isInDraggedGroup(targetId) {
      if (!dragId) return false;
      const draggedItem = state.items[dragId];
      if (!draggedItem || draggedItem.type !== 'header') return false;
      const targetItem = state.items[targetId];
      return !!(targetItem && targetItem.categoryIds?.[state.current] === dragId);
    }

    // Returns true if dropping a header at (targetRow, after) would split another category from its items
    function isInvalidHeaderDrop(draggedId, targetRow, targetId, after) {
      const draggedItem = state.items[draggedId];
      if (!draggedItem || draggedItem.type !== 'header') return false;
      const targetItem = state.items[targetId];
      if (!after) {
        // Dropping before any categorized item always splits its category — block unconditionally
        if (targetItem && targetItem.type === 'item' && targetItem.categoryIds?.[state.current]) return true;
      } else {
        // Dropping after a header — block if the next visible DOM row belongs to it
        if (targetItem && targetItem.type === 'header') {
          let next = targetRow.nextElementSibling;
          while (next && next.classList.contains('drop-indicator')) next = next.nextElementSibling;
          if (next && next.dataset.id && !next.classList.contains('add-row')) {
            const nextItem = state.items[next.dataset.id];
            if (nextItem && nextItem.categoryIds?.[state.current] === targetId) return true;
          }
        }
        // Dropping after a categorized item — block if the next visible DOM row is in the same category
        if (targetItem && targetItem.type === 'item' && targetItem.categoryIds?.[state.current]) {
          let next = targetRow.nextElementSibling;
          while (next && next.classList.contains('drop-indicator')) next = next.nextElementSibling;
          if (next && next.dataset.id && !next.classList.contains('add-row')) {
            const nextItem = state.items[next.dataset.id];
            if (nextItem && nextItem.categoryIds?.[state.current] === targetItem.categoryIds[state.current]) return true;
          }
        }
      }
      return false;
    }

    // ── Drag helpers ──────────────────────────────────────────────────────────

    const SCROLL_ZONE        = 80; // px from viewport edge to begin auto-scroll
    const SCROLL_SPEED       = 10; // max px per event tick
    const SCROLL_TAP_THRESHOLD = 10; // px — movement below this is treated as a purposeful tap

    function getDragScrollSpeed(clientY) {
      const vh = window.innerHeight;
      if (clientY < SCROLL_ZONE)
        return -Math.round(SCROLL_SPEED * (1 - clientY / SCROLL_ZONE));
      if (clientY > vh - SCROLL_ZONE)
        return Math.round(SCROLL_SPEED * (1 - (vh - clientY) / SCROLL_ZONE));
      return 0;
    }

    function isCursorAfterMidpoint(e, el) {
      const rect = el.getBoundingClientRect();
      return e.clientY > rect.top + rect.height / 2;
    }

    function showDropIndicator(targetRow, after) {
      removeDropIndicator();
      dropIndicatorEl = document.createElement('div');
      dropIndicatorEl.className = 'drop-indicator';
      if (after) {
        targetRow.after(dropIndicatorEl);
      } else {
        targetRow.before(dropIndicatorEl);
      }
    }

    function removeDropIndicator() {
      if (dropIndicatorEl) { dropIndicatorEl.remove(); dropIndicatorEl = null; }
    }

    function reorder(fromId, toId, after) {
      const order = state.layouts[state.current];
      const baseline = [...order];
      const fromItem = state.items[fromId];

      if (fromItem && fromItem.type === 'header') {
        // Move header and all its items as a group
        const group = [fromId, ...getCategoryItems(state.current, fromId, true)];
        group.forEach(gid => {
          const idx = order.indexOf(gid);
          if (idx !== -1) order.splice(idx, 1);
        });
        const toIdx = order.indexOf(toId);
        if (toIdx === -1) {
          group.forEach(gid => order.push(gid));
        } else {
          let insertAt = after ? toIdx + 1 : toIdx;
          // If dropping after a collapsed category header, skip past its hidden items
          if (after && state.items[toId]?.type === 'header' && collapsedHeaders[state.current].has(toId)) {
            while (insertAt < order.length &&
                   state.items[order[insertAt]]?.categoryIds?.[state.current] === toId) {
              insertAt++;
            }
          }
          [...group].reverse().forEach(gid => order.splice(insertAt, 0, gid));
        }
      } else {
        const fromIdx = order.indexOf(fromId);
        if (fromIdx === -1) return;
        order.splice(fromIdx, 1);
        const toIdx = order.indexOf(toId);
        order.splice(after ? toIdx + 1 : toIdx, 0, fromId);
        // Update categoryId based on what's now immediately above the dropped item
        const newIdx = order.indexOf(fromId);
        let newCategoryId = null;
        for (let i = newIdx - 1; i >= 0; i--) {
          const pid = order[i];
          const pitem = state.items[pid];
          if (!pitem || pitem.deleted) continue;
          newCategoryId = pitem.type === 'header' ? pid : (pitem.categoryIds?.[state.current] || null);
          break;
        }
        if (!state.items[fromId].categoryIds) state.items[fromId].categoryIds = { A: null, B: null, C: null };
        if (state.items[fromId].categoryIds[state.current] !== newCategoryId) {
          state.items[fromId].categoryIds[state.current] = newCategoryId;
          state.items[fromId].updatedAt = Date.now();
          fbSyncItem(fromId);
        }
      }

      save();
      fbSyncLayout(state.current, baseline);
      removeDropIndicator();
      render();
    }

    // ── Title editing ─────────────────────────────────────────────────────────

    function initTitleEdit(h1) {
      h1.addEventListener('click', function () {
        const input = document.createElement('input');
        input.className = 'title-input';
        input.value = state.title;
        h1.replaceWith(input);
        input.select();

        function commit() {
          const val = input.value.trim() || 'My Checklist';

          newH1.textContent = val;

        input.addEventListener('blur', commit);

          if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
          if (e.key === 'Escape') { input.value = state.title; input.blur(); }
        });

    // ── Dismiss keyboard on scroll or outside tap ─────────────────────────────

    let _lastFocusTime = 0;

    // Blur the active textarea when the page scrolls (user is scrolling, not typing).
    // 300 ms grace period ignores the automatic scroll iOS does when the keyboard appears.
    window.addEventListener('scroll', () => {
      if (Date.now() - _lastFocusTime < 300) return;
      if (document.activeElement?.tagName === 'TEXTAREA') document.activeElement.blur();
    }, { passive: true });

    // Blur the active textarea when the user taps anywhere outside it.
    // This covers checkbox taps, category-button taps, and bare row/page taps.
    document.addEventListener('touchstart', e => {
      if (document.activeElement?.tagName === 'TEXTAREA' && !e.target.closest('textarea')) {
        document.activeElement.blur();
      }
    }, { passive: true });

    // ── Mouse drag auto-scroll ────────────────────────────────────────────────

    document.addEventListener('dragover', e => {
      if (!dragId) return;
      const speed = getDragScrollSpeed(e.clientY);
      if (speed !== 0) window.scrollBy(0, speed);
    });

    // ── Layout tabs ───────────────────────────────────────────────────────────

    document.querySelectorAll('.layout-tab').forEach(btn => {
      let lastTapTime = 0;

      btn.addEventListener('click', () => {
        if (btn.dataset.layout === state.current) return;

      function activateTabEdit() {

          const val = input.value.trim() || (layout === 'A' ? 'Layout A' : layout === 'B' ? 'Layout B' : 'Layout C');
          state.layoutNames[layout] = val;
          save();
          fbSyncMeta();
          input.replaceWith(btn);
          btn.textContent = val;
        }

        input.addEventListener('blur', commit);
        input.addEventListener('keydown', e => {
          if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
          if (e.key === 'Escape') { input.value = state.layoutNames[layout]; input.blur(); }
        });
      }

      btn.addEventListener('dblclick', e => {
        e.stopPropagation();
        activateTabEdit();
      });

      // iOS Safari does not fire dblclick on touch — detect double-tap manually
      btn.addEventListener('touchend', e => {
        const now = Date.now();
        if (now - lastTapTime < 300) {
          e.preventDefault(); // cancel the subsequent click
          activateTabEdit();

        lastTapTime = now;

    function renderUsageChart(id, chartArea, statsArea) {
      chartArea.innerHTML = '';
      statsArea.innerHTML = '';
      if (!id) return;

      const rawEntries = Object.entries(qtyHistory[id] || {});
      rawEntries.sort((a, b) => a[0].localeCompare(b[0]));

      if (rawEntries.length < 2) {
        const msg = document.createElement('div');
        msg.className = 'usage-no-data';
        msg.textContent = 'Not enough data to graph yet.';
        chartArea.appendChild(msg);
        return;
      }

      const dates  = rawEntries.map(e => e[0]);
      const values = rawEntries.map(e => e[1]);

      // Detect fill type (all values in 0/0.25/0.5/1) vs number type
      const fillVals = new Set([0, 0.25, 0.5, 1]);
      const isFill = values.every(v => fillVals.has(v));

      const maxVal = isFill ? 1 : Math.max(...values, 1);

      // Convert date strings to timestamps for linear X positioning
      const timestamps = dates.map(d => new Date(d + 'T00:00:00').getTime());
      const tMin = timestamps[0];
      const tMax = timestamps[timestamps.length - 1];
      const tRange = tMax - tMin || 1;

      // SVG dimensions
      const W = 300, H = 150;
      const PAD_L = isFill ? 38 : 30, PAD_R = 10, PAD_T = 12, PAD_B = 28;
      const gW = W - PAD_L - PAD_R;
      const gH = H - PAD_T - PAD_B;

      function xOf(ts)  { return PAD_L + ((ts - tMin) / tRange) * gW; }
      function yOf(val) { return PAD_T + (1 - val / maxVal) * gH; }

      const svgNS = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(svgNS, 'svg');
      svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
      svg.setAttribute('aria-label', 'Quantity history chart');

      // Determine dark mode
      const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const axisColor  = dark ? '#636366' : '#d1d5db';
      const textColor  = dark ? '#8e8e93' : '#6b7280';
      const lineColor  = '#4f46e5';
      const dotColor   = '#4f46e5';
      const dashColor  = dark ? '#3a3a3c' : '#e5e7eb';

      function makeLine(x1, y1, x2, y2, stroke, sw, dash) {
        const l = document.createElementNS(svgNS, 'line');
        l.setAttribute('x1', x1); l.setAttribute('y1', y1);
        l.setAttribute('x2', x2); l.setAttribute('y2', y2);
        l.setAttribute('stroke', stroke);
        l.setAttribute('stroke-width', sw);
        if (dash) l.setAttribute('stroke-dasharray', dash);
        return l;
      }
      function makeText(x, y, txt, anchor, size, color) {
        const t = document.createElementNS(svgNS, 'text');
        t.setAttribute('x', x); t.setAttribute('y', y);
        t.setAttribute('text-anchor', anchor);
        t.setAttribute('font-size', size);
        t.setAttribute('fill', color);
        t.setAttribute('font-family', 'sans-serif');
        t.textContent = txt;
        return t;
      }

      // Axes
      svg.appendChild(makeLine(PAD_L, PAD_T, PAD_L, PAD_T + gH, axisColor, 1, null));
      svg.appendChild(makeLine(PAD_L, PAD_T + gH, PAD_L + gW, PAD_T + gH, axisColor, 1, null));

      // Y axis labels
      if (isFill) {
        [{ v: 1, label: 'Full' }, { v: 0.5, label: 'Half' }, { v: 0.25, label: 'Low' }, { v: 0, label: 'Empty' }].forEach(({ v, label }) => {
          const y = yOf(v);
          svg.appendChild(makeLine(PAD_L, y, PAD_L + gW, y, dashColor, 0.5, '3 3'));
          svg.appendChild(makeText(PAD_L - 3, y + 4, label, 'end', 8, textColor));
        });
      } else {
        // 0 and max ticks
        svg.appendChild(makeText(PAD_L - 3, yOf(0) + 4, '0', 'end', 8, textColor));
        svg.appendChild(makeText(PAD_L - 3, yOf(maxVal) + 4, String(maxVal), 'end', 8, textColor));
        svg.appendChild(makeLine(PAD_L, yOf(0), PAD_L + gW, yOf(0), dashColor, 0.5, '3 3'));
      }

      // X axis date labels (first and last)
      const fmtDate = d => { const p = d.split('-'); return p[1] + '/' + p[2] + '/' + p[0].slice(2); };
      svg.appendChild(makeText(PAD_L, PAD_T + gH + 16, fmtDate(dates[0]), 'start', 8, textColor));
      svg.appendChild(makeText(PAD_L + gW, PAD_T + gH + 16, fmtDate(dates[dates.length - 1]), 'end', 8, textColor));

      // Line connecting data points
      const pts = timestamps.map((ts, i) => xOf(ts) + ',' + yOf(values[i])).join(' ');
      const polyline = document.createElementNS(svgNS, 'polyline');
      polyline.setAttribute('points', pts);
      polyline.setAttribute('fill', 'none');
      polyline.setAttribute('stroke', lineColor);
      polyline.setAttribute('stroke-width', '2');
      polyline.setAttribute('stroke-linejoin', 'round');
      svg.appendChild(polyline);

      // Dots at each data point
      timestamps.forEach((ts, i) => {
        const circle = document.createElementNS(svgNS, 'circle');
        circle.setAttribute('cx', xOf(ts));
        circle.setAttribute('cy', yOf(values[i]));
        circle.setAttribute('r', '3');
        circle.setAttribute('fill', dotColor);
        svg.appendChild(circle);
      });

      chartArea.appendChild(svg);

      // ── Usage rate stats ──────────────────────────────────────────────────
      const msPerDay = 86400000;
      const totalDays = (tMax - tMin) / msPerDay;
      let totalUsed = 0;
      for (let i = 1; i < values.length; i++) {
        if (values[i] < values[i - 1]) totalUsed += values[i - 1] - values[i];
      }

      if (totalDays >= 7) {
        const perDay = totalUsed / totalDays;
        const s1 = document.createElement('span');
        s1.textContent = '~' + (Math.round(perDay * 100) / 100) + ' used per day';
        statsArea.appendChild(s1);
      }
      if (totalDays >= 14) {
        const perWeek = (totalUsed / totalDays) * 7;
        const s2 = document.createElement('span');
        s2.textContent = '~' + (Math.round(perWeek * 100) / 100) + ' used per week';
        statsArea.appendChild(s2);
      }
    }

    // ── Compare Retailers — Parsers & Unit Price ────────────────────────────

    function _parsePrice(str) {
      if (!str) return null;
      var n = parseFloat(str.replace(/[^0-9.]/g, ''));
      return isNaN(n) ? null : n;
    }

    function _calcUnitPrice(title, totalPrice) {
      var t = title.toLowerCase();

      // Paper: sheets × count → per 100 sheets
      var sheetsMatch = t.match(/(\d+)\s*sheets/);
      var countMatch = t.match(/(\d+)\s*[-\s]?\s*(count|ct|pk|pack|rolls?)\b/);
      if (sheetsMatch && countMatch) {
        var totalSheets = parseInt(sheetsMatch[1]) * parseInt(countMatch[1]);
        if (totalSheets > 0) return { unitPrice: (totalPrice / totalSheets) * 100, unitLabel: '100sh' };
      }
      // Rolls only
      if (!sheetsMatch && countMatch && /rolls?/i.test(countMatch[2])) {
        var rc = parseInt(countMatch[1]);
        if (rc > 0) return { unitPrice: totalPrice / rc, unitLabel: 'roll' };
      }
      // fl oz (before oz)
      var flozM = t.match(/([\d.]+)\s*fl\.?\s*oz\b/);
      if (flozM) { var v = parseFloat(flozM[1]); if (v > 0) return { unitPrice: totalPrice / v, unitLabel: 'fl oz' }; }
      // oz
      var ozM = t.match(/([\d.]+)\s*oz\b/);
      if (ozM && !t.match(new RegExp(ozM[1] + '\\s*fl'))) { var v2 = parseFloat(ozM[1]); if (v2 > 0) return { unitPrice: totalPrice / v2, unitLabel: 'oz' }; }
      // lb → oz
      var lbM = t.match(/([\d.]+)\s*lbs?\b/);
      if (lbM) { var v3 = parseFloat(lbM[1]) * 16; if (v3 > 0) return { unitPrice: totalPrice / v3, unitLabel: 'oz' }; }
      // kg → oz
      var kgM = t.match(/([\d.]+)\s*kg\b/);
      if (kgM) { var v4 = parseFloat(kgM[1]) * 35.274; if (v4 > 0) return { unitPrice: totalPrice / v4, unitLabel: 'oz' }; }
      // g → oz (not gal)
      var gM = t.match(/([\d.]+)\s*g\b(?!al)/);
      if (gM) { var v5 = parseFloat(gM[1]) / 28.3495; if (v5 > 0) return { unitPrice: totalPrice / v5, unitLabel: 'oz' }; }
      // gallon → fl oz
      var galM = t.match(/([\d.]+)\s*(gallons?|gal)\b/);
      if (galM) { var v6 = parseFloat(galM[1]) * 128; if (v6 > 0) return { unitPrice: totalPrice / v6, unitLabel: 'fl oz' }; }
      // liter → fl oz
      var litM = t.match(/([\d.]+)\s*(liters?|l)\b/);
      if (litM) { var v7 = parseFloat(litM[1]) * 33.814; if (v7 > 0) return { unitPrice: totalPrice / v7, unitLabel: 'fl oz' }; }
      // ml → fl oz
      var mlM = t.match(/([\d.]+)\s*ml\b/);
      if (mlM) { var v8 = parseFloat(mlM[1]) / 29.5735; if (v8 > 0) return { unitPrice: totalPrice / v8, unitLabel: 'fl oz' }; }
      // Count
      if (countMatch && !/rolls?/i.test(countMatch[2])) {
        var cc = parseInt(countMatch[1]);
        if (cc > 0) return { unitPrice: totalPrice / cc, unitLabel: 'ct' };
      }
      var miscM = t.match(/(\d+)\s*[-\s]?\s*(pods?|bags?|capsules?|tablets?|bars?|cans?|ea|each)\b/);
      if (miscM) { var mc = parseInt(miscM[1]); if (mc > 0) return { unitPrice: totalPrice / mc, unitLabel: 'ct' }; }
      return null;
    }

    function _parseAmazon(html) {
      var products = [];
      var cards = html.split('data-component-type="s-search-result"');
      console.log('Amazon parser: ' + (cards.length - 1) + ' search result cards found');
      for (var i = 1; i < cards.length && products.length < 10; i++) {
        var card = cards[i];
        try {
          var brandM = card.match(/a-size-base-plus a-color-base">([^<]+)/);
          var brand = brandM ? brandM[1].trim() : '';
          var titleM = card.match(/a-size-base-plus a-spacing-none a-color-base a-text-normal"><span>([^<]+)/);
          var title = titleM ? titleM[1].trim() : '';
          if (!title) {
            var imgAltM2 = card.match(/alt="([^"]{10,})"[^>]*class="s-image"/);
            console.log('Amazon card ' + i + ': no title match, img alt=' + (imgAltM2 ? '"' + imgAltM2[1].substring(0, 60) + '"' : 'none'));
            continue;
          }
          var imgAltM = card.match(/alt="([^"]{10,})"[^>]*class="s-image"/);
          var imgAlt = imgAltM ? imgAltM[1].trim() : '';
          var fullTitle = imgAlt.length > title.length ? imgAlt : (brand && !title.startsWith(brand) ? brand + ' ' + title : title);
          var linkM = card.match(/href="(\/[^"]*\/dp\/[^"]+)"/);
          var link = linkM ? 'https://www.amazon.com' + linkM[1].split('&amp;').join('&').split('?')[0] : '';
          var priceM = card.match(/<span class="a-price"[^>]*data-a-size="xl"[^>]*>[\s\S]*?<span class="a-offscreen">([^<]+)/);
          var priceStr = priceM ? priceM[1].trim() : '';
          var price = _parsePrice(priceStr);
          if (!price) {
            console.log('Amazon card ' + i + ': title="' + title.substring(0, 50) + '" but no price (data-a-size="xl" ' + (card.indexOf('data-a-size="xl"') !== -1 ? 'exists' : 'MISSING') + ', a-offscreen ' + (card.indexOf('a-offscreen') !== -1 ? 'exists' : 'MISSING') + ')');
            continue;
          }
          // Amazon unit price e.g. "($2.28/100 Sheets)"
          var unitM = card.match(/\([\s\S]*?<span class="a-offscreen">([^<]+)<\/span>[^)]*\/([\w\s]+)\)/);
          var unitPrice = null, unitLabel = '';
          if (unitM) {
            unitPrice = _parsePrice(unitM[1]);
            unitLabel = unitM[2].trim().toLowerCase();
            if (unitLabel === 'pound' || unitLabel === 'lb') { unitPrice = unitPrice / 16; unitLabel = 'oz'; }
            else if (unitLabel === 'ounce') unitLabel = 'oz';
            else if (unitLabel === 'fluid ounce') unitLabel = 'fl oz';
            else if (unitLabel === 'count' || unitLabel === 'each') unitLabel = 'ct';
            else if (unitLabel === '100 sheets') unitLabel = '100sh';
          }
          if (!unitPrice) {
            var calc = _calcUnitPrice(fullTitle, price);
            if (calc) { unitPrice = calc.unitPrice; unitLabel = calc.unitLabel; }
          }
          products.push({ retailer: 'Amazon', title: fullTitle, price: priceStr, priceNum: price,
            unitPrice: unitPrice ? unitPrice.toFixed(4) : null, unitLabel: unitLabel || null, link: link });
        } catch (e) { /* skip */ }
      }
      return products;
    }

    function _parseInstacart(html, retailer) {
      var products = [];
      var cardParts = html.split(/href="(\/products\/[^"]+)"/);
      for (var i = 1; i < cardParts.length && products.length < 10; i += 2) {
        var href = cardParts[i];
        var after = cardParts[i + 1] || '';
        var before = cardParts[i - 1] || '';
        try {
          var titleM = after.match(/role="heading"[^>]*>([^<]+)/);
          var title = titleM ? titleM[1].trim() : '';
          if (!title) { var altM = before.match(/alt="([^"]+)"\s*class="e-/); title = altM ? altM[1].trim() : ''; }
          if (!title) continue;
          var priceM = after.match(/Current price:\s*\$([0-9]+\.[0-9]{2})/);
          var priceStr = priceM ? '$' + priceM[1] : '';
          var price = _parsePrice(priceStr);
          if (!price) continue;
          var sizeM = after.match(/class="e-cauxk8">([^<]+)/);
          var sizeText = sizeM ? sizeM[1].trim() : '';
          var link = 'https://www.instacart.com' + href.split('"')[0];
          var combined = title + (sizeText ? ', ' + sizeText : '');
          var calc = _calcUnitPrice(combined, price);
          products.push({ retailer: retailer, title: title, price: priceStr, priceNum: price,
            unitPrice: calc ? calc.unitPrice.toFixed(4) : null, unitLabel: calc ? calc.unitLabel : null, link: link });
        } catch (e) { /* skip */ }
      }
      return products;
    }

          }
        }

        function updateTopCard(name, products, error) {
          var card = topCards[name];
          var spinner = card.querySelector('.compare-loading');
          if (spinner) spinner.remove();
          if (error || !products || products.length === 0) {
            var na = document.createElement('div');
            na.className = 'compare-top-na';
            na.textContent = error ? 'Unavailable' : 'No results';
            card.appendChild(na);
          } else {
            var withUnit = products.filter(function(p) { return p.unitPrice; });
            var best = withUnit.length > 0
              ? withUnit.reduce(function(a, b) { return parseFloat(a.unitPrice) < parseFloat(b.unitPrice) ? a : b; })
              : products[0];
            var prDiv = document.createElement('div');
            prDiv.className = 'compare-top-price';
            prDiv.textContent = best.price;
            card.appendChild(prDiv);
            if (best.unitPrice && best.unitLabel) {
              var uDiv = document.createElement('div');
              uDiv.className = 'compare-top-unit';
              uDiv.textContent = fmtUnit(best);
              card.appendChild(uDiv);
            }
          }
        }

        // Call ScraperAPI directly from the browser (no Vercel function needed)
        // Stagger Instacart requests to avoid IP collision / rate-limiting
        var apiKey = getScraperApiKey();

        function fetchRetailer(r, scraperUrl, isRetry, onDone) {
          var fetchUrl = isRetry ? scraperUrl + '&_nocache=' + Date.now() : scraperUrl;
          var t0 = performance.now();
          fetch(fetchUrl)
            .then(function(resp) {
              if (!resp.ok) throw new Error('HTTP ' + resp.status);
              return resp.text();
            })
            .then(function(html) {
              var elapsed = ((performance.now() - t0) / 1000).toFixed(1);
              console.log(r.name + (isRetry ? ' (retry)' : '') + ' [' + elapsed + 's]: HTML length=' + html.length
                + ', product links=' + (html.match(/href="\/products\//g) || []).length
                + ', has "Current price"=' + (html.indexOf('Current price:') !== -1)
                + ', has "captcha"=' + (html.toLowerCase().indexOf('captcha') !== -1));
              var products = r.parse(html);
              if (products.length === 0 && r.render && !isRetry) {
                console.log(r.name + ': 0 products parsed, retrying in 5s…');
                setTimeout(function() { fetchRetailer(r, scraperUrl, true, onDone); }, 5000);
                return;
              }
              allResults[r.name] = products;
              updateTopCard(r.name, products, null);
              loadingDivs[r.name].remove();
              renderResults();
              completed++;
              if (completed === 3) compareBtn.disabled = false;
              if (onDone) onDone();
            })
            .catch(function(err) {
              var elapsed = ((performance.now() - t0) / 1000).toFixed(1);
              if (r.render && !isRetry) {
                console.log(r.name + ' [' + elapsed + 's]: ' + err.message + ', retrying in 5s…');
                setTimeout(function() { fetchRetailer(r, scraperUrl, true, onDone); }, 5000);
                return;
              }
              console.log(r.name + (isRetry ? ' (retry)' : '') + ' [' + elapsed + 's]: ' + err.message);
              allResults[r.name] = [];
              updateTopCard(r.name, null, err.message);
              loadingDivs[r.name].remove();
              renderResults();
              completed++;
              if (completed === 3) compareBtn.disabled = false;
              if (onDone) onDone();
            });
        }

        // Build ScraperAPI URL for a retailer
        function buildScraperUrl(r, query) {
          var targetUrl = r.url(query);
          return 'https://api.scraperapi.com?api_key=' + encodeURIComponent(apiKey)
            + '&url=' + encodeURIComponent(targetUrl)
            + (r.render ? '&render=true' : '');
        }

        // Fire Amazon immediately (fast, no render conflict)
        // Run Instacart stores sequentially so each gets full rendering resources
        var renderQueue = [];
        retailerTargets.forEach(function(r) {
          if (!r.render) {
            fetchRetailer(r, buildScraperUrl(r, query), false, null);
          } else {
            renderQueue.push(r);
          }
        });

        function runNextRender() {
          if (renderQueue.length === 0) return;
          var r = renderQueue.shift();
          fetchRetailer(r, buildScraperUrl(r, query), false, runNextRender);
        }
        runNextRender();
      });

      var doneBtn = document.createElement('button');
      doneBtn.className = 'receipt-done-btn';
      doneBtn.textContent = 'Done';
      doneBtn.addEventListener('click', function() { overlay.remove(); });

      inner.appendChild(heading);
      inner.appendChild(sel);
      inner.appendChild(compareBtn);
      inner.appendChild(topRow);
      inner.appendChild(resultsArea);
      inner.appendChild(doneBtn);
      overlay.appendChild(inner);
      document.body.appendChild(overlay);
    }

    // ── Init ──────────────────────────────────────────────────────────────────

    loadState();
    loadQtyHistory();
    list.appendChild(createAddRow());
    render();
    initTitleEdit(document.querySelector('h1'));

    // ── Firebase real-time sync ───────────────────────────────────────────────
    //
    // SETUP (one-time):
    //  1. Go to console.firebase.google.com → create a project
    //  2. Add a web app → copy the 5 config values below
    //  3. Enable Realtime Database → start in test mode, then paste these rules
    //     in Database → Rules:
    //       { "rules": { "users": { "$uid": {
    //           ".read": "$uid === auth.uid",
    //           ".write": "$uid === auth.uid"
    //       }}}}
    //  4. Enable Authentication → Sign-in method → Google
    //  5. Authentication → Settings → Authorized domains → add your GitHub Pages
    //     domain (e.g. yourusername.github.io)

    const FIREBASE_CONFIG = {
      apiKey:      'AIzaSyCxpdBVsnu8umQXT_NdDAGv7OmgsRPl2Nc',
      authDomain:  'my-checklist-app-a0b5e.firebaseapp.com',
      databaseURL: 'https://my-checklist-app-a0b5e-default-rtdb.firebaseio.com',
      projectId:   'my-checklist-app-a0b5e',
      appId:       '1:531099472671:web:ab5d1ec956b48a02e0d62a'
    };

    const FIREBASE_ENABLED = FIREBASE_CONFIG.apiKey !== 'REPLACE_WITH_YOUR_API_KEY';

    const syncEl = document.getElementById('sync-status');
    let syncTimer = null;

    function setSyncStatus(msg, cls) {
      clearTimeout(syncTimer);
      syncEl.innerHTML = msg;
      syncEl.className = 'sync-status' + (cls ? ' ' + cls : '');
      if (cls === 'ok') syncTimer = setTimeout(() => {
        syncEl.textContent = '';
        syncEl.className = 'sync-status';
      }, 3000);
    }

    // ── Conflict dialog for simultaneous layout reordering ────────────────────

    function showLayoutConflictDialog(layoutId, remoteOrder, remoteTs) {
      // Only show one dialog at a time; apply remote silently if a dialog is already open
      if (document.getElementById('conflict-dialog')) {
        state.layouts[layoutId] = remoteOrder;
        state.layoutUpdatedAt[layoutId] = remoteTs;
        lastSyncedLayoutOrder[layoutId] = [...remoteOrder];
        localStorage.setItem('checklist-v2', JSON.stringify(state));
        render();
        return;
      }

      const layoutName = state.layoutNames[layoutId] || ('Layout ' + layoutId);

      const overlay = document.createElement('div');
      overlay.id = 'conflict-dialog';
      overlay.className = 'conflict-dialog-overlay';

      const dialog = document.createElement('div');
      dialog.className = 'conflict-dialog';
      dialog.innerHTML =
        '<h3>Layout conflict</h3>' +
        '<p><strong>' + layoutName + '</strong> was rearranged on another device. ' +
        'Keep your order or use theirs?</p>' +
        '<div class="btn-row">' +
        '<button class="btn-keep">Keep Mine</button>' +
        '<button class="btn-use">Use Theirs</button>' +
        '</div>';

      overlay.appendChild(dialog);
      document.body.appendChild(overlay);

      dialog.querySelector('.btn-keep').addEventListener('click', () => {
        overlay.remove();
        fbSyncLayout(layoutId);
      });

      dialog.querySelector('.btn-use').addEventListener('click', () => {
        state.layouts[layoutId] = remoteOrder;
        state.layoutUpdatedAt[layoutId] = remoteTs;
        lastSyncedLayoutOrder[layoutId] = [...remoteOrder];
        overlay.remove();
        localStorage.setItem('checklist-v2', JSON.stringify(state));
        render();
      });
    }

    // ── Merge incoming remote state ───────────────────────────────────────────

    function mergeRemoteState(remote) {
      if (!remote) return;
      let changed = false;

      // Items: per-item last-write-wins by timestamp
      if (remote.items) {
        Object.entries(remote.items).forEach(([id, remoteItem]) => {
          const local = state.items[id];
          if (!local || (remoteItem.updatedAt || 0) > (local.updatedAt || 0)) {
            state.items[id] = remoteItem;
            if (!state.items[id].hasOwnProperty('categoryIds')) {
              const oldCat = state.items[id].categoryId || null;
              const inA = oldCat ? state.layouts.A.includes(oldCat) : false;
              const inB = oldCat ? state.layouts.B.includes(oldCat) : false;
              const inC = oldCat ? (state.layouts.C || []).includes(oldCat) : false;
              state.items[id].categoryIds = { A: inA ? oldCat : null, B: inB ? oldCat : null, C: inC ? oldCat : null };
            }
            if (!state.items[id].hasOwnProperty('qtyType'))  state.items[id].qtyType  = null;
            if (!state.items[id].hasOwnProperty('qtyValue')) state.items[id].qtyValue = null;
            changed = true;
          }
        });
      }

      // Layout order: conflict dialog if both sides changed since last sync
      if (remote.layouts) {
        Object.keys(remote.layouts).forEach(layoutId => {
          const remoteOrder = remote.layouts[layoutId];
          const remoteTs = (remote.layoutUpdatedAt || {})[layoutId] || 0;
          const localTs  = state.layoutUpdatedAt[layoutId] || 0;

          const localLayoutIsEmpty = (state.layouts[layoutId] || []).length === 0;
          if (remoteTs > localTs || localLayoutIsEmpty) {
            const synced       = lastSyncedLayoutOrder[layoutId] || [];
            const localChanged = JSON.stringify(state.layouts[layoutId]) !== JSON.stringify(synced);

            if (localChanged && synced.length > 0) {
              showLayoutConflictDialog(layoutId, remoteOrder, remoteTs);
            } else {
              state.layouts[layoutId] = remoteOrder;
              state.layoutUpdatedAt[layoutId] = remoteTs;
              lastSyncedLayoutOrder[layoutId] = [...remoteOrder];
              changed = true;
            }
          }
        });
      }

      // Meta: last-write-wins (skip if unchanged to avoid re-render loops)
      if (remote.layoutNames) {
        Object.keys(remote.layoutNames).forEach(k => {
          if (remote.layoutNames[k] !== state.layoutNames[k]) {
            state.layoutNames[k] = remote.layoutNames[k];
            changed = true;
          }
        });
      }
      if (remote.title && remote.title !== state.title) {
        state.title = remote.title;
        changed = true;
      }

      // Qty history: additive merge — keep any date entry not already recorded locally
      if (remote.qtyHistory) {
        let histChanged = false;
        Object.entries(remote.qtyHistory).forEach(([itemId, dates]) => {
          if (!qtyHistory[itemId]) qtyHistory[itemId] = {};
          Object.entries(dates || {}).forEach(([dateStr, val]) => {
            if (!(dateStr in qtyHistory[itemId])) {
              qtyHistory[itemId][dateStr] = val;
              histChanged = true;
            }
          });
        });
        if (histChanged) saveQtyHistory();
      }

      if (changed) {
        localStorage.setItem('checklist-v2', JSON.stringify(state));
        render();
      }
    }

    if (FIREBASE_ENABLED) {
      firebase.initializeApp(FIREBASE_CONFIG);
      const fbAuth = firebase.auth();
      const fbDb   = firebase.database();
      let   fbUid  = null;
      let   fbListener = null;

      fbSyncItem = function(id) {
        if (!fbUid || !state.items[id]) return;
        fbDb.ref('users/' + fbUid + '/checklist/items/' + id)
          .set(state.items[id])
          .then(() => setSyncStatus('Synced', 'ok'))
          .catch(() => setSyncStatus('Sync failed \u2014 saved locally', 'error'));
      };

      fbSyncLayout = function(layoutId, baseline) {
        if (!fbUid) return;
        const now = Date.now();
        state.layoutUpdatedAt[layoutId] = now;
        // Use the pre-change baseline as the conflict-detection anchor when provided.
        // Without it (e.g. after conflict resolution), anchor to the current order.
        lastSyncedLayoutOrder[layoutId] = baseline !== undefined ? [...baseline] : [...state.layouts[layoutId]];
        localStorage.setItem('checklist-v2', JSON.stringify(state));
        fbDb.ref('users/' + fbUid + '/checklist/layouts/' + layoutId).set(state.layouts[layoutId]);
        fbDb.ref('users/' + fbUid + '/checklist/layoutUpdatedAt/' + layoutId).set(now)
          .then(() => setSyncStatus('Synced', 'ok'))
          .catch(() => setSyncStatus('Sync failed \u2014 saved locally', 'error'));
      };

      fbSyncMeta = function() {
        if (!fbUid) return;
        fbDb.ref('users/' + fbUid + '/checklist/title').set(state.title);
        fbDb.ref('users/' + fbUid + '/checklist/layoutNames').set(state.layoutNames)
          .then(() => setSyncStatus('Synced', 'ok'))
          .catch(() => setSyncStatus('Sync failed \u2014 saved locally', 'error'));
      };

      fbSyncQtyHistory = function(id, dateStr, val) {
        if (!fbUid) return;
        fbDb.ref('users/' + fbUid + '/checklist/qtyHistory/' + id + '/' + dateStr).set(val);
      };

      function startListener() {
        if (fbListener) return;
        fbListener = fbDb.ref('users/' + fbUid + '/checklist').on('value', snap => {
          if (snap.exists()) mergeRemoteState(snap.val());
        });
      }

      fbAuth.onAuthStateChanged(user => {
        if (user) {
          fbUid = user.uid;

          if (Object.keys(state.items).length === 0) {
            // Restore from cloud if this device has no items (fresh install or iOS localStorage eviction)
            setSyncStatus('Restoring from cloud\u2026');
            fbDb.ref('users/' + fbUid + '/checklist').once('value').then(snap => {
              if (snap.exists()) {
                const remote = snap.val();
                state = Object.assign(state, remote);
                state.layouts         = Object.assign({ A: [], B: [], C: [] }, remote.layouts);
                state.hideChecked     = Object.assign({ A: false, B: false, C: false }, remote.hideChecked);
                state.layoutUpdatedAt = Object.assign({ A: 0, B: 0, C: 0 }, remote.layoutUpdatedAt);
                if (!remote.layouts || !remote.layouts.C) {
                  state.layouts.C = state.layouts.A.filter(id => {
                    const item = state.items[id];
                    return item && item.type !== 'header';
                  });
                }
                Object.keys(state.items || {}).forEach(id => {
                  state.items[id].updatedAt = state.items[id].updatedAt || 0;
                  state.items[id].deleted   = state.items[id].deleted   || false;
                  if (!state.items[id].hasOwnProperty('categoryIds')) {
                    const oldCat = state.items[id].categoryId || null;
                    const inA = oldCat ? state.layouts.A.includes(oldCat) : false;
                    const inB = oldCat ? state.layouts.B.includes(oldCat) : false;
                    const inC = oldCat ? (state.layouts.C || []).includes(oldCat) : false;
                    state.items[id].categoryIds = { A: inA ? oldCat : null, B: inB ? oldCat : null, C: inC ? oldCat : null };
                  }
                  if (!state.items[id].hasOwnProperty('qtyType'))  state.items[id].qtyType  = null;
                  if (!state.items[id].hasOwnProperty('qtyValue')) state.items[id].qtyValue = null;
                });
                lastSyncedLayoutOrder = {
                  A: [...(state.layouts.A || [])],
                  B: [...(state.layouts.B || [])],
                  C: [...(state.layouts.C || [])]
                };
                localStorage.setItem('checklist-v2', JSON.stringify(state));
                // Restore qty history from cloud
                if (remote.qtyHistory) {
                  Object.entries(remote.qtyHistory).forEach(([itemId, dates]) => {
                    qtyHistory[itemId] = Object.assign(qtyHistory[itemId] || {}, dates || {});
                  });
                  saveQtyHistory();
                }
                render();
                setSyncStatus('Restored from cloud', 'ok');
              } else {
                setSyncStatus('');
              }
              startListener();
            }).catch(() => setSyncStatus('Could not reach cloud', 'error'));
          } else {
            setSyncStatus('');
            startListener();
          }
        } else {
          if (fbListener && fbUid) {
            fbDb.ref('users/' + fbUid + '/checklist').off('value', fbListener);
            fbListener = null;
          }
          fbUid = null;
          setSyncStatus('<a href="#" id="signin-link">Sign in with Google</a> to back up your checklist');
          document.getElementById('signin-link').addEventListener('click', e => {
            e.preventDefault();
            const provider = new firebase.auth.GoogleAuthProvider();
            // Always use popup — signInWithRedirect breaks in iOS standalone PWA mode
            // because iOS opens the redirect in Safari instead of returning to the PWA.
            fbAuth.signInWithPopup(provider)
              .catch(err => setSyncStatus('Sign-in failed: ' + err.message, 'error'));
          });
        }
      });

      // Catch any error coming back from a Google redirect sign-in
      fbAuth.getRedirectResult().catch(err => {
        if (err && err.code !== 'auth/no-auth-event') {
          setSyncStatus('Sign-in failed: ' + err.message, 'error');
        }
      });

    } else {
      setSyncStatus('Add Firebase config to enable cloud backup');
    }

    // ── PWA: Service Worker registration ─────────────────────────────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' }).catch(err => {
          console.warn('SW registration failed:', err);
        });
      });
    }
  </script>
</body>
